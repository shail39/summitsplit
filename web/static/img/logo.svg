<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Mountain icon -->
  <g>
    <!-- Back mountain -->
    <polygon points="38,38 58,10 78,38" fill="#94a3b8"/>
    <!-- Front mountain left -->
    <polygon points="18,38 44,8 60,38" fill="#1e293b"/>
    <!-- Snow cap -->
    <polygon points="44,8 39,18 49,18" fill="#f1f5f9"/>
    <!-- Split line -->
    <line x1="44" y1="22" x2="44" y2="38" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Text -->
  <text x="90" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Summit</text>
  <text x="90" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#f97316">Split</text>
</svg>
