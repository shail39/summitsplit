services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: summitsplit
      POSTGRES_USER: summitsplit
      POSTGRES_PASSWORD: summitsplit
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U summitsplit"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://summitsplit:summitsplit@db:5432/summitsplit?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
